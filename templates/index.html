<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TableCreator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="container">
      <div class="page-header">
        <h1>Генератор SQL для PostgreSQL</h1>
        <a href="{{ url_for('download_template') }}" class="btn-secondary">Скачать шаблон .xlsm</a>
      </div>

      <form method="post" enctype="multipart/form-data" class="card">
        <label for="config_file">Загрузите файл конфигурации</label>
        <input id="config_file" name="config_file" type="file" required>
        <button type="submit">Сгенерировать SQL</button>
      </form>

      {% if errors %}
      <section class="card error">
        <h2>Ошибки валидации</h2>
        <ul>
          {% for error in errors %}
          <li>{{ error }}</li>
          {% endfor %}
        </ul>
      </section>
      {% endif %}

      {% if sql_output %}
      <section class="card">
        <h2>Сгенерированный SQL</h2>
        <textarea readonly rows="16">{{ sql_output }}</textarea>
        <form method="post" action="{{ url_for('download_sql') }}">
          <textarea name="sql_output" hidden>{{ sql_output }}</textarea>
          <button type="submit">Скачать .sql</button>
        </form>
      </section>
      {% endif %}
    </main>
  </body>
</html>
